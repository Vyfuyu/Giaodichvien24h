[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/giaodichvien24h run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node scripts/railway-start.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
